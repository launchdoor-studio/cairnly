services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      # Always use Compose service hostname `postgres` inside the stack (not DATABASE_URL from .env, which targets the host Mac).
      DATABASE_URL: postgres://${POSTGRES_USER:-cairnly}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-cairnly}
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
      CAIRNLY_TELEMETRY_ENABLED: ${CAIRNLY_TELEMETRY_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cairnly}
      POSTGRES_USER: ${POSTGRES_USER:-cairnly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    environment:
      CAIRNLY_DOMAIN: ${CAIRNLY_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
